<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAIHOME</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+TC:wght@300;400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4efe6;
    --gold: #a8845a;
    --gold-dim: rgba(168,132,90,0.45);
    --text: #2a2018;
    --text-dim: rgba(42,32,24,0.45);
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 100; opacity: 0.35;
  }

  /* HERO */
  .hero {
    min-height: 100svh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 60px 24px 40px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(168,132,90,0.07) 0%, transparent 65%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute; bottom: -60px; left: 50%;
    transform: translateX(-50%);
    width: 1px; height: 120px;
    background: linear-gradient(to bottom, var(--gold-dim), transparent);
  }

  .hero-bg-text {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(120px, 35vw, 300px);
    font-weight: 300;
    color: transparent;
    -webkit-text-stroke: 1px rgba(168,132,90,0.1);
    user-select: none; pointer-events: none;
    white-space: nowrap;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .logo-wrap {
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
  }
  .logo-eyebrow {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200; font-size: 10px;
    letter-spacing: 0.5em; color: var(--gold);
    text-transform: uppercase; opacity: 0.75;
  }
  .logo-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 15vw, 100px);
    font-weight: 300; letter-spacing: 0.22em; line-height: 1;
    color: var(--text);
  }

  .rule {
    display: flex; align-items: center; gap: 16px;
    margin: 44px 0 36px;
    animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) both;
    animation-delay: 0.1s;
  }
  .rule::before, .rule::after {
    content: ''; height: 1px; width: 70px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  }
  .rule-diamond {
    width: 5px; height: 5px;
    background: var(--gold); transform: rotate(45deg); opacity: 0.8;
  }

  .hero-tagline {
    font-family: 'Noto Serif TC', serif;
    font-weight: 300; font-size: 14px;
    letter-spacing: 0.25em; color: var(--text-dim);
    text-align: center;
    animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) both;
    animation-delay: 0.2s;
  }

  /* SECTIONS */
  .section {
    padding: 60px 24px 44px;
    max-width: 560px; margin: 0 auto;
  }
  .section-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200; font-size: 9px;
    letter-spacing: 0.5em; color: var(--gold);
    text-transform: uppercase; text-align: center;
    margin-bottom: 10px; opacity: 0.65;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(24px, 7vw, 36px);
    font-weight: 400; letter-spacing: 0.15em;
    text-align: center; color: var(--text);
    margin-bottom: 30px;
  }

  /* BUTTONS */
  .btn-group { display: flex; flex-direction: column; gap: 10px; }

  .btn {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 26px;
    text-decoration: none; border: 1px solid;
    border-radius: 2px;
    transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    position: relative; overflow: hidden;
  }
  .btn::before {
    content: ''; position: absolute; inset: 0;
    transform: translateX(-101%);
    transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
  }
  .btn:hover::before { transform: translateX(0); }

  .btn-text {
    font-family: 'Noto Serif TC', serif;
    font-weight: 300; font-size: 14px; letter-spacing: 0.2em;
    position: relative; z-index: 1; transition: color 0.4s;
  }
  .btn-icon {
    position: relative; z-index: 1;
    font-size: 15px; opacity: 0.45;
    transition: all 0.4s;
  }
  .btn:hover .btn-icon { opacity: 1; transform: translateX(4px); }

  .btn-primary {
    border-color: var(--gold-dim);
    background: rgba(196,168,130,0.05);
    color: var(--text);
  }
  .btn-primary::before { background: var(--gold); }
  .btn-primary .btn-text { color: var(--text); }
  .btn-primary:hover .btn-text { color: #f4efe6; }
  .btn-primary:hover .btn-icon { color: #f4efe6; }

  .btn-outline {
    border-color: rgba(196,168,130,0.18);
    background: rgba(196,168,130,0.03);
    color: var(--text);
  }
  .btn-outline::before { background: rgba(196,168,130,0.12); }

  .btn-social {
    border-color: rgba(196,168,130,0.15);
    background: rgba(196,168,130,0.03);
    color: var(--text);
  }
  .btn-social::before { background: rgba(196,168,130,0.1); }

  .tag {
    display: inline-block;
    font-family: 'Montserrat', sans-serif;
    font-size: 8px; font-weight: 300; letter-spacing: 0.3em;
    padding: 2px 8px;
    border: 1px solid rgba(196,168,130,0.4);
    color: var(--gold); margin-left: 10px;
    vertical-align: middle;
    position: relative; z-index: 1;
  }

  /* DIVIDER */
  .divider {
    display: flex; align-items: center; justify-content: center;
    padding: 0 24px; max-width: 560px; margin: 0 auto;
  }
  .divider-line {
    flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, rgba(196,168,130,0.15), transparent);
  }
  .divider-motif {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; color: var(--gold);
    padding: 0 20px; opacity: 0.35;
  }

  /* FOOTER */
  footer { padding: 50px 24px 70px; text-align: center; }
  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 300; letter-spacing: 0.45em;
    color: var(--text); margin-bottom: 10px; opacity: 0.4;
  }
  .footer-note {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200; font-size: 9px; letter-spacing: 0.3em;
    color: var(--gold); text-transform: uppercase; opacity: 0.3;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .reveal {
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-bg-text">ZH</div>
  <div class="logo-wrap">
    <span class="logo-eyebrow">Home &amp; Living</span>
    <h1 class="logo-main">ZAIHOME</h1>
  </div>
  <div class="rule"><div class="rule-diamond"></div></div>
  <p class="hero-tagline">讓每個角落，都成為你的風格</p>
</section>


<div class="divider reveal">
  <div class="divider-line"></div>
  <span class="divider-motif">✦</span>
  <div class="divider-line"></div>
</div>

<section class="section reveal">
  <p class="section-label">Information</p>
  <h2 class="section-title">購 物 須 知</h2>
  <div class="btn-group">
    <a href="https://apple528124-source.github.io/zaihome-web/ready/" class="btn btn-primary" target="_blank">
      <span class="btn-text">購物須知 ／ 常見問題</span>
      <span class="btn-icon">→</span>
    </a>
  </div>
</section>


<div class="divider reveal">
  <div class="divider-line"></div>
  <span class="divider-motif">✦</span>
  <div class="divider-line"></div>
</div>

<section class="section reveal">
  <p class="section-label">Shop &amp; Order</p>
  <h2 class="section-title">訂 製 ｜ 購 物</h2>
  <div class="btn-group">
    <a href="https://apple528124-source.github.io/zaihome-web/" class="btn btn-primary" target="_blank">
      <span class="btn-text">客製訂製服務</span>
      <span class="btn-icon">→</span>
    </a>
    <a href="https://zaihome.shopstore.tw" class="btn btn-outline" target="_blank">
      <span class="btn-text">官方購物 <span class="tag">全面 9 折</span></span>
      <span class="btn-icon">→</span>
    </a>
    <a href="https://shopee.tw/chiiasdsd" class="btn btn-outline" target="_blank">
      <span class="btn-text">蝦皮賣場 <span class="tag">搭配活動</span></span>
      <span class="btn-icon">→</span>
    </a>
  </div>
</section>


<div class="divider reveal">
  <div class="divider-line"></div>
  <span class="divider-motif">✦</span>
  <div class="divider-line"></div>
</div>

<section class="section reveal">
  <p class="section-label">Connect</p>
  <h2 class="section-title">聯 絡 客 服</h2>
  <div class="btn-group">
    <a href="https://lin.ee/pXdubpa" class="btn btn-social" target="_blank">
      <span class="btn-text">LINE@ 官方客服</span>
      <span class="btn-icon">💬</span>
    </a>
    <a href="https://www.instagram.com/zai._home?igsh=MXVlejI3ZW5qb3p0Zw%3D%3D&utm_source=qr" class="btn btn-social" target="_blank">
      <span class="btn-text">Instagram</span>
      <span class="btn-icon">✦</span>
    </a>
  </div>
</section>


<footer class="reveal">
  <div class="divider" style="margin-bottom: 40px;">
    <div class="divider-line"></div>
    <span class="divider-motif">✦</span>
    <div class="divider-line"></div>
  </div>
  <div class="footer-logo">ZAIHOME</div>
  <p class="footer-note">Est. Taiwan</p>
</footer>

<script>
  const io = new IntersectionObserver(
    es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
    { threshold: 0.15 }
  );
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>
</body>
</html>
